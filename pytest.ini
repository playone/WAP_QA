[pytest]
# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
testpaths =
    wap_tests/tests
    api_tests/tests

python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
addopts =
    -v
    --tb=short
    --strict-markers

# ---------------------------------------------------------------------------
# Custom markers
# ---------------------------------------------------------------------------
markers =
    wap:  WAP / mobile browser tests (deselect with -m "not wap")
    api:  REST API tests (deselect with -m "not api")
    slow: Tests that take more than ~30 s

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
